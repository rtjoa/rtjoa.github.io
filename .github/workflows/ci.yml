name: CI

on:
  push:
    branches:
      - main
      - wip
  pull_request:
    branches:
      - main

jobs:
  check_diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: diff <(python ./main.py) index.html
